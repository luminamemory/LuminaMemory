<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<title>Proiecta • Magická dílna | LuminaMemory™</title>
<meta name="description" content="Proiecta je magická kreativní dílna LuminaMemory™ – místo pro nápady, obrázky, soubory a spolupráci s Luminou." />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="favicon.png" />

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, rgba(255,255,255,0.15), rgba(0,0,0,0.85)),
              url('cracked-glass.png');
  background-size: cover;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 1.4rem;
  opacity: 0.9;
}

main {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

.section {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 16px;
  min-height: 300px;
  position: relative;
}

.section h2 {
  margin-top: 0;
  font-size: 1.1rem;
}

.chat {
  grid-column: span 3;
  min-height: 220px;
}

.log {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-top: 10px;
}

textarea, input {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: none;
  border-radius: 8px;
  padding: 8px;
  color: #fff;
}

button {
  margin-top: 8px;
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #ffd86b;
  color: #000;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 12px;
  font-size: 0.75rem;
  opacity: 0.6;
}
</style>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += "<div>• " + msg + "</div>";
}

function genImage() {
  log("Hmm… kreslím… nemluv na mě.");
  setTimeout(() => {
    log("Hotovo ✨ Dej si čaj nebo cigáro.");
  }, 8000);
}

function saveText() {
  log("Nápad zaznamenán 🪄");
}

function chatSend() {
  log("Lumina: Vidím, co tvoříš. Možná to patří do projektu.");
}
</script>
</head>

<body>

<header>
🧙‍♀️ Proiecta – Magická dílna  
<div style="font-size:0.85rem;opacity:0.7">Tady se tvoří dřív, než se třídí.</div>
</header>

<main>

<section class="section">
<h2>🖼️ Vizuální dílna</h2>
<input placeholder="Popiš obrázek…" />
<button onclick="genImage()">Vytvořit</button>
</section>

<section class="section">
<h2>✍️ Textová dílna</h2>
<textarea rows="6" placeholder="Nápad, myšlenka, chaos…"></textarea>
<button onclick="saveText()">Zapsat</button>
</section>

<section class="section">
<h2>📎 Soubory</h2>
<input type="file" />
<div class="log">Přetáhni sem soubor</div>
</section>

<section class="section chat">
<h2>💬 Lumina – kreativní chat</h2>
<textarea rows="4" placeholder="Zeptej se Luminy…"></textarea>
<button onclick="chatSend()">Odeslat</button>
<div id="log" class="log"></div>
</section>

</main>

<footer>
DEMO • LuminaMemory™ • Proiecta není projektový manažer. Je to dílna.
</footer>

</body>
</html>
