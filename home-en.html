  <style>
    :root{
      /* Pozadí: použijeme luminamemory.png jako full-screen background */
      --bg-image: url("luminamemory.png");

      --ink: rgba(255,255,255,.92);
      --ink2: rgba(255,255,255,.72);

      --glowV: rgba(175,135,255,.65);
      --glowC: rgba(80,210,255,.55);
      --glowW: rgba(255,255,255,.35);
    }

    *{ box-sizing:border-box }
    html,body{ height:100%; margin:0 }
    body{
      overflow:hidden;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--ink);
      background:#000; /* fallback */
    }

    /* ===== Background image (full-screen) ===== */
    .bg{
      position:fixed; inset:0;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transform: scale(1.02);
      filter: saturate(1.05) contrast(1.02);
    }

    /* vignette for readability */
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 40%, rgba(0,0,0,.06) 0, rgba(0,0,0,.30) 60%, rgba(0,0,0,.62) 100%);
      pointer-events:none;
    }

    /* ===== Stars over background (no lasers) ===== */
    .stars{
      position:fixed; inset:0;
      pointer-events:none;
      z-index: 1;
      opacity:.95;
    }

    .star{
      position:absolute;
      border-radius:999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.98), rgba(255,255,255,.35) 55%, rgba(255,255,255,0) 72%);
      animation: twinkle 4s ease-in-out infinite;
      transform: translateZ(0);
    }

    @keyframes twinkle{
      0%,100%{ opacity: .35; transform: scale(1); }
      50%{ opacity: 1; transform: scale(1.25); }
    }

    /* ===== Back button above bg (never hidden) ===== */
    .back{
      position:fixed;
      left:18px;
      bottom:18px;
      z-index: 3;
      font-size:13px;
      color:var(--ink2);
      text-decoration:none;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: filter .18s ease, background .18s ease;
    }
    .back:hover{ filter:brightness(1.08); background:rgba(0,0,0,.30); }

    /* ===== Square logo button (raised / 3D) ===== */
    .enterWrap{
      position:fixed;
      left:0; right:0;
      bottom: 120px;
      display:flex;
      justify-content:center;
      z-index: 3;
      pointer-events:none;
    }

    .enterBtn{
      pointer-events:auto;
      width: 160px;
      height: 160px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.20);
      box-shadow:
        0 28px 78px rgba(0,0,0,.62),
        0 0 60px rgba(175,135,255,.55),
        0 0 110px rgba(80,210,255,.34),
        0 0 22px rgba(255,255,255,.14),
        inset 0 1px 0 rgba(255,255,255,.20),
        inset 0 -14px 26px rgba(0,0,0,.40);
      overflow:hidden;
      cursor:pointer;
      position:relative;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      outline:none;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }

    /* extra outer halo ring */
    .enterBtn::before{
      content:"";
      position:absolute; inset:-10px;
      border-radius: 22px;
      background: radial-gradient(circle at 50% 50%,
        rgba(175,135,255,.32),
        rgba(80,210,255,.20) 45%,
        rgba(255,255,255,.08) 62%,
        rgba(0,0,0,0) 72%);
      opacity:.95;
      filter: blur(6px);
      z-index:0;
      pointer-events:none;
    }

    /* inner bevel */
    .enterBtn::after{
      content:"";
      position:absolute; inset:0;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0) 35%, rgba(0,0,0,.22));
      z-index:1;
      pointer-events:none;
      mix-blend-mode: screen;
      opacity:.55;
    }

    .enterBtn:hover{
      filter: brightness(1.06);
      transform: translateY(-2px);
      box-shadow:
        0 34px 88px rgba(0,0,0,.68),
        0 0 74px rgba(175,135,255,.62),
        0 0 140px rgba(80,210,255,.40),
        0 0 28px rgba(255,255,255,.18),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -14px 26px rgba(0,0,0,.40);
    }

    /* logo fits button nicely */
    .enterBtn img{
      position:absolute;
      inset: 14px;               /* padding around logo inside button */
      width: calc(100% - 28px);
      height: calc(100% - 28px);
      object-fit: contain;       /* IMPORTANT: no cropping */
      display:block;
      z-index:2;
      transform: translateZ(0);
      filter:
        drop-shadow(0 0 18px rgba(175,135,255,.34))
        drop-shadow(0 0 26px rgba(80,210,255,.22));
      user-select:none;
      -webkit-user-drag:none;
      opacity: .995;
    }

    /* Press-in (zamáčknutí) */
    .enterBtn.is-pressed{
      transform: translateY(6px) scale(.96);
      filter: brightness(1.10) saturate(1.08);
      box-shadow:
        0 18px 52px rgba(0,0,0,.55),
        0 0 44px rgba(175,135,255,.46),
        0 0 86px rgba(80,210,255,.30),
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 -18px 30px rgba(0,0,0,.45);
      transition: transform .22s cubic-bezier(.2,.9,.2,1), filter .22s ease, box-shadow .22s ease;
    }

    /* Flash overlay (rozjasnění obrazovky) */
    .flash{
      position:fixed; inset:0;
      z-index: 10;
      pointer-events:none;
      opacity:0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,.92), rgba(255,255,255,.25) 40%, rgba(255,255,255,0) 72%);
      transition: opacity .18s ease;
    }
    .flash.is-on{ opacity:1; }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce){
      .star{ animation:none !important; }
      .enterBtn{ transition:none !important; }
      .flash{ transition:none !important; }
      .bg{ transform:none; }
    }

    /* Mobile tuning */
    @media (max-width:520px){
      .enterWrap{ bottom: 105px; }
      .enterBtn{ width: 150px; height: 150px; border-radius: 16px; }
      .enterBtn img{ inset: 12px; width: calc(100% - 24px); height: calc(100% - 24px); }
    }
  </style>

  <script>
    (function(){
      const btn   = document.getElementById("enterBtn");
      const flash = document.getElementById("flash");
      const target = "mini-login-en.html";

      btn.addEventListener("click", () => {
        btn.classList.add("is-pressed");
        flash.classList.add("is-on");

        window.setTimeout(()=> flash.classList.remove("is-on"), 220);
        window.setTimeout(()=> { window.location.href = target; }, 950);
      });
    })();
