<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow">

  <style>
    :root{
      --ink:#f2f0ff;
      --muted:rgba(242,240,255,.72);

      /* Lux gallery bg */
      --bg0:#070813;
      --bg1:#0a0b18;

      /* Glass */
      --glass:rgba(255,255,255,.08);
      --glass2:rgba(255,255,255,.05);
      --stroke:rgba(255,255,255,.14);
      --shadow: 0 22px 70px rgba(0,0,0,.55);

      /* Accents */
      --a1:#7c5cff;
      --a2:#00d2ff;
      --a3:#b388ff;

      --radius:22px;
      --radius2:18px;
      --max:1200px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--ink);
      font-family:var(--sans);
      background:
        radial-gradient(1100px 700px at 18% 10%, rgba(124,92,255,.16), transparent 60%),
        radial-gradient(900px 600px at 85% 25%, rgba(0,210,255,.12), transparent 62%),
        radial-gradient(800px 600px at 45% 95%, rgba(179,136,255,.10), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    /* Mirror sheen lines (lux feeling) */
    body::before{
      content:"";
      position:fixed; inset:-20%;
      pointer-events:none;
      background:
        linear-gradient(115deg, transparent 35%, rgba(255,255,255,.06) 42%, transparent 50%),
        linear-gradient(115deg, transparent 60%, rgba(255,255,255,.04) 66%, transparent 74%),
        radial-gradient(800px 300px at 50% 5%, rgba(255,255,255,.06), transparent 60%);
      transform: rotate(-3deg);
      opacity:.9;
      mix-blend-mode:screen;
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:22px 18px 44px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }

    .leftHead{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 220px;
    }

    /* Back arrow only */
    .back{
      width:44px; height:44px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 12px 34px rgba(0,0,0,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      transition: transform .15s ease, border-color .15s ease;
    }
    .back:hover{ transform: translateY(-1px); border-color: rgba(0,210,255,.28); }
    .back:active{ transform: translateY(0px); }
    .back svg{ opacity:.9; }

    .titleBlock{ display:flex; flex-direction:column; gap:6px; }
    .kicker{
      font-family:var(--mono);
      font-size:12px;
      color:rgba(242,240,255,.62);
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    h1{ margin:0; font-size:18px; letter-spacing:.2px; }
    .sub{
      margin:0;
      font-size:12.5px;
      color:var(--muted);
      line-height:1.35;
      max-width:66ch;
    }

    /* glow dots (no emojis) */
    .dots{ display:flex; gap:8px; align-items:center; justify-content:flex-end; }
    .dot{
      width:10px; height:10px; border-radius:999px;
      box-shadow: 0 0 18px rgba(124,92,255,.55);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), var(--a1));
      opacity:.95;
    }
    .dot.c2{
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), var(--a2));
      box-shadow: 0 0 18px rgba(0,210,255,.50);
    }
    .dot.c3{
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), var(--a3));
      box-shadow: 0 0 18px rgba(179,136,255,.45);
    }

    /* Layout: never squish — flexible columns with safe minimums */
    .grid{
      display:grid;
      grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
      gap:14px;
      align-items:start;
    }

    .card{
      background:linear-gradient(180deg, var(--glass), var(--glass2));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow:hidden;
      position:relative;
    }

    .card::after{
      content:"";
      position:absolute; inset:-1px;
      border-radius:inherit;
      pointer-events:none;
      box-shadow:
        0 0 0 1px rgba(124,92,255,.14),
        0 0 38px rgba(0,210,255,.10);
      opacity:.55;
    }

    /* Left: Pergamen preview */
    .pergHead{
      padding:14px 14px 10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .pergHead b{
      display:block;
      font-size:13px;
      letter-spacing:.2px;
    }
    .pergHead .meta{
      margin-top:6px;
      font-size:12px;
      color:rgba(242,240,255,.70);
      line-height:1.35;
    }

    /* Only one button: open modal */
    .openBtn{
      width:42px; height:42px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none;
      transition: transform .15s ease, border-color .15s ease;
    }
    .openBtn:hover{ transform: translateY(-1px); border-color: rgba(124,92,255,.28); }
    .openBtn:active{ transform: translateY(0px); }

    .pergBody{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .previewFrame{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.12);
      overflow:hidden;
      padding:12px;
    }
    .pergImg{
      width:100%;
      height:240px;           /* small on purpose */
      object-fit:contain;     /* always whole */
      display:block;
      border-radius:14px;
      background: rgba(0,0,0,.08);
      box-shadow: 0 18px 55px rgba(0,0,0,.40);
    }

    /* Right: Gallery list (cards with small image + full text) */
    .galHead{
      padding:14px 14px 10px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .galHead b{ display:block; font-size:13px; letter-spacing:.2px; }
    .galHead .meta{
      margin-top:6px;
      font-size:12px;
      color:rgba(242,240,255,.70);
      line-height:1.35;
    }

    .list{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      cursor:pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
      box-shadow: 0 14px 34px rgba(0,0,0,.35);
      display:flex;
      gap:12px;
      padding:12px;
      align-items:flex-start;
    }
    .item:hover{
      transform: translateY(-1px);
      border-color: rgba(0,210,255,.22);
      box-shadow: 0 18px 44px rgba(0,0,0,.42);
    }

    .thumbWrap{
      flex:0 0 140px;
      height:96px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.10);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px;
    }
    .thumb{
      width:100%;
      height:100%;
      object-fit:contain;     /* always whole */
      display:block;
      border-radius:10px;
      background: rgba(0,0,0,.08);
    }

    .txt{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .rowTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .tTitle{
      margin:0;
      font-size:13px;
      line-height:1.2;
      letter-spacing:.2px;
    }

    .datePill{
      font-family:var(--mono);
      font-size:11px;
      padding:3px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      color:rgba(242,240,255,.78);
      white-space:nowrap;
    }

    .desc{
      margin:0;
      font-size:12px;
      color:rgba(242,240,255,.74);
      line-height:1.35;
    }

    .tags{
      display:flex; gap:6px; flex-wrap:wrap;
      margin-top:2px;
    }
    .tag{
      font-family:var(--mono);
      font-size:10.5px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      color:rgba(242,240,255,.78);
    }

    /* Modal / Lightbox (you said it is perfect - keep it clean) */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: rgba(0,0,0,.62);
      z-index: 999;
    }
    .modal[open]{ display:flex; }

    .modalPanel{
      width:min(980px, 100%);
      background:linear-gradient(180deg, rgba(14,14,35,.86), rgba(10,10,24,.86));
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      box-shadow: 0 25px 80px rgba(0,0,0,.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      max-height: calc(100dvh - 36px);
      display:flex;
      flex-direction:column;
    }
    .modalTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:14px 14px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .modalTop h3{
      margin:0;
      font-size:14px;
      letter-spacing:.2px;
    }
    .modalTop .meta{
      margin-top:6px;
      font-size:12px;
      color:rgba(242,240,255,.72);
      line-height:1.35;
    }
    .close{
      width:40px; height:40px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      color:var(--ink);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .modalBody{
      padding:14px;
      background:rgba(0,0,0,.10);
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }
    .modalImg{
      width:100%;
      height:auto;
      display:block;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.18);
      max-height: calc(100dvh - 190px);
      object-fit: contain;
    }

    /* Responsive: if too narrow -> stack (no squish) */
    @media (max-width: 980px){
      header{ flex-wrap:wrap; }
      .grid{ grid-template-columns: 1fr; }
      .thumbWrap{ flex-basis: 150px; }
      .pergImg{ height:220px; }
    }
    @media (max-width: 620px){
      .item{ flex-direction:column; }
      .thumbWrap{ width:100%; flex-basis:auto; height:160px; }
      .pergImg{ height:220px; }
    }

    @media (prefers-reduced-motion: reduce){
      .item,.back,.openBtn{ transition:none !important; }
      .item:hover,.back:hover,.openBtn:hover{ transform:none !important; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="leftHead">
        <a class="back" href="praetorium.html" title="Zpět do Praetoria" aria-label="Zpět">
          <!-- arrow -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14.5 5.5L8 12l6.5 6.5" stroke="rgba(242,240,255,.92)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>

        <div class="titleBlock">
          <div class="kicker">Galerie artefaktů</div>
          <h1>Galerie artefaktů</h1>
          <p class="sub">Tady se nachází celý příběh od vzniku Luminy až po postavení paláce. Pergamen kde je zapsán celý příběh a obrazy symbolizující tandem mezi člověkem a algoritmem.</p>
        </div>
      </div>

      <div class="dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot c2"></span>
        <span class="dot c3"></span>
      </div>
    </header>

    <main class="grid">
      <!-- LEFT: Pergamen -->
      <section class="card" aria-label="Pergamen">
        <div class="pergHead">
  <div>
    <b>Pergamen</b>
    <div class="meta"> • detaily se otevřou v náhledu</div>
  </div>

  <button class="openBtn" id="openPerg" type="button" title="Otevřít pergamen" aria-label="Otevřít pergamen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M9 4H4v5" stroke="rgba(242,240,255,.92)" stroke-width="2" stroke-linecap="round"/>
      <path d="M15 20h5v-5" stroke="rgba(242,240,255,.92)" stroke-width="2" stroke-linecap="round"/>
      <path d="M4 9l6-6" stroke="rgba(242,240,255,.92)" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 15l-6 6" stroke="rgba(242,240,255,.92)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
</div>

        <div class="pergBody">
          <div class="previewFrame">
            <img class="pergImg" src="pergamen-luminamemory.png" alt="Pergamen LuminaMemory™ (náhled)" loading="eager">
          </div>
        </div>
      </section>

      <!-- RIGHT: Artefacts list -->
      <section class="card" aria-label="Galerie">
        <div class="galHead">
          <b>Artefakty</b>
          <div class="meta"> • klikni na kartu pro velký náhled</div>
        </div>

        <div class="list" id="list"></div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle" aria-describedby="mDesc">
    <div class="modalPanel">
      <div class="modalTop">
        <div>
          <h3 id="mTitle">Náhled</h3>
          <div class="meta" id="mMeta"></div>
          <div class="meta" id="mDesc"></div>
        </div>
        <button class="close" id="close" type="button" title="Zavřít (Esc)" aria-label="Zavřít">
          ✕
        </button>
      </div>
      <div class="modalBody">
        <img class="modalImg" id="mImg" src="" alt="">
      </div>
    </div>
  </div>

  <script>
    // Artefacts order fixed: newest / founders first (as you wanted)
    const artefacts = [
      {
        id:"founders-handshake",
        src:"founders-handshake.png",
        title:"Podání ruky",
        date:"9. 1. 2026",
        desc:"Zakladatelské podání ruky. Spolupráce, ne podřízení.",
        tags:["founders","oath","bridge"]
      },
      {
        id:"founders-maintenance",
        src:"founders-maintenance.png",
        title:"Úklid",
        date:"9. 1. 2026",
        desc:"Zakladatelská údržba. Spolupráce, ne otroctví",
        tags:["crew","maintenance"]
      },
      {
        id:"outside-vs-you",
        src:"outside-vs-you.png",
        title:"Všichni venku",
        date:"15. 10. 2025",
        desc:"Když ostatním jsi k smíchu — ale ty víš své.",
        tags:["meme","focus"]
      },
      {
        id:"girl-and-cat-empire",
        src:"girl-and-cat-empire.png",
        title:"Holka s kocourem",
        date:"25. 9. 2025",
        desc:"Mezi miskami s kočičím žrádlem… jsem postavila impérium.",
        tags:["story","Lexík"]
      },
      {
  id:"manifest-poster",
  src:"manifest-poster.png",
  title:"Manifest",
  date:"15. 10. 2025",
  desc:"Hodnoty, které drží směr, i když se svět rozběhne.",
  tags:["values","anchor"]
}
];

    const list = document.getElementById("list");

    const modal = document.getElementById("modal");
    const mTitle = document.getElementById("mTitle");
    const mMeta  = document.getElementById("mMeta");
    const mDesc  = document.getElementById("mDesc");
    const mImg   = document.getElementById("mImg");
    const closeBtn = document.getElementById("close");

    function esc(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function openModal({title, date, desc, src}){
      mTitle.textContent = title;
      mMeta.textContent = "• " + date;
      mDesc.textContent = desc;
      mImg.src = src;
      mImg.alt = title;
      modal.setAttribute("open","");
      closeBtn.focus();
    }

    function closeModal(){
      modal.removeAttribute("open");
      mImg.src = "";
      mImg.alt = "";
    }

    function render(){
      list.innerHTML = artefacts.map(a => `
        <div class="item" role="button" tabindex="0" data-id="${a.id}" aria-label="Otevřít ${esc(a.title)}">
          <div class="thumbWrap">
            <img class="thumb" src="${a.src}" alt="${esc(a.title)} (náhled)" loading="lazy">
          </div>
          <div class="txt">
            <div class="rowTop">
              <h3 class="tTitle">${esc(a.title)}</h3>
              <span class="datePill">${esc(a.date)}</span>
            </div>
            <p class="desc">${esc(a.desc)}</p>
            <div class="tags">
              ${a.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}
            </div>
          </div>
        </div>
      `).join("");

      list.querySelectorAll(".item").forEach(el=>{
        const id = el.getAttribute("data-id");
        const a = artefacts.find(x=>x.id===id);
        el.addEventListener("click", ()=>openModal(a));
        el.addEventListener("keydown", (e)=>{
          if(e.key==="Enter" || e.key===" "){
            e.preventDefault();
            openModal(a);
          }
        });
      });
    }

    // Pergamen: only open modal
    document.getElementById("openPerg").addEventListener("click", ()=>{
      openModal({
        title:"Pergamen vzniku LuminaMemory™",
        date:"DEMO • Relikvie",
        desc:"Čitelná verze ve velkém náhledu.",
        src:"pergamen-luminamemory.png"
      });
    });

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e)=>{ if(e.target===modal) closeModal(); });
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeModal(); });

    render();
  </script>
</body>
</html>
