<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuminaMemory™ • home</title>

  <style>
    :root{
      /* 1) SEM DEJ NÁZEV BACKGROUND OBRÁZKU (dej ho do stejné složky) */
      --bg-image: url("luminamemory.png");

      --ink: rgba(255,255,255,.92);
      --ink2: rgba(255,255,255,.72);
      --border: rgba(255,255,255,.16);

      --glowV: rgba(175,135,255,.55);
      --glowC: rgba(80,210,255,.40);
    }

    *{ box-sizing:border-box }
    html,body{ height:100%; margin:0 }
    body{
      overflow:hidden;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--ink);
      background:#000; /* fallback */
    }

    /* ===== Background image (full-screen) ===== */
    .bg{
      position:fixed; inset:0;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transform: scale(1.02);
      filter: saturate(1.05) contrast(1.02);
    }

    /* optional: slight vignette to make UI readable */
    .bg::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 50% 45%, rgba(0,0,0,.08) 0, rgba(0,0,0,.35) 58%, rgba(0,0,0,.62) 100%);
      pointer-events:none;
    }

    /* ===== Laser layer over background ===== */
    .fx{
      position:fixed; inset:0;
      pointer-events:none;
      z-index: 1;
      mix-blend-mode: screen;
      opacity: .9;
    }

    .laser{
      position:absolute;
      left:-20vw; right:-20vw;
      height:2px;
      background:linear-gradient(90deg, transparent, rgba(80,210,255,.0), rgba(80,210,255,.55), rgba(175,135,255,.60), rgba(255,255,255,.35), transparent);
      filter: drop-shadow(0 0 18px var(--glowV));
      opacity:.22;
      animation: drift 9.5s ease-in-out infinite;
    }
    .laser.l1{ top:32%; transform: rotate(-10deg); animation-duration:9.5s; }
    .laser.l2{ top:52%; transform: rotate(7deg);  opacity:.18; animation-duration:11.5s; animation-delay:-2.2s; }
    .laser.l3{ top:68%; transform: rotate(-4deg); opacity:.14; animation-duration:13.0s; animation-delay:-4.8s; }

    @keyframes drift{
      0%,100%{ transform: translateX(-2vw) rotate(var(--r)); filter: drop-shadow(0 0 14px var(--glowV)); }
      50%{     transform: translateX( 2vw) rotate(var(--r)); filter: drop-shadow(0 0 18px var(--glowC)); }
    }
    .laser.l1{ --r:-10deg; }
    .laser.l2{ --r:  7deg; }
    .laser.l3{ --r: -4deg; }

    /* ===== UI layer ===== */
    .ui{
      position:relative;
      z-index: 2;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Back button must be above bg */
    .back{
      position:fixed;
      left:18px;
      bottom:18px;
      z-index: 3;
      font-size:13px;
      color:var(--ink2);
      text-decoration:none;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: filter .18s ease, background .18s ease;
    }
    .back:hover{ filter:brightness(1.08); background:rgba(0,0,0,.30); }

    /* Square logo button (raised / 3D) */
    .enterWrap{
      position:fixed;
      left:0; right:0;
      bottom: 120px; /* trochu výš než předtím */
      display:flex;
      justify-content:center;
      z-index: 3;
      pointer-events:none;
    }

    .enterBtn{
      pointer-events:auto;
      width: 152px;
      height: 152px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.20);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.18), rgba(255,255,255,.06) 40%, rgba(0,0,0,.0) 70%),
        rgba(0,0,0,.22);
      box-shadow:
        0 26px 70px rgba(0,0,0,.60),
        0 0 40px rgba(175,135,255,.40),
        0 0 70px rgba(80,210,255,.24),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -10px 22px rgba(0,0,0,.35);
      overflow:hidden;
      cursor:pointer;
      position:relative;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      outline:none;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .enterBtn:hover{
      filter: brightness(1.06);
      transform: translateY(-2px);
      box-shadow:
        0 32px 78px rgba(0,0,0,.66),
        0 0 52px rgba(175,135,255,.46),
        0 0 92px rgba(80,210,255,.28),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 -10px 22px rgba(0,0,0,.35);
    }

    /* logo fills the entire button */
    .enterBtn img{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      transform: scale(1.02);
      filter: drop-shadow(0 0 18px rgba(175,135,255,.28));
      user-select:none;
      -webkit-user-drag:none;
      opacity:.98;
    }

    /* Press-in (zamáčknutí) */
    .enterBtn.is-pressed{
      transform: translateY(6px) scale(.96);
      filter: brightness(1.10) saturate(1.08);
      box-shadow:
        0 18px 52px rgba(0,0,0,.55),
        0 0 32px rgba(175,135,255,.32),
        0 0 58px rgba(80,210,255,.20),
        inset 0 1px 0 rgba(255,255,255,.18),
        inset 0 -18px 30px rgba(0,0,0,.45);
      transition: transform .22s cubic-bezier(.2,.9,.2,1), filter .22s ease, box-shadow .22s ease;
    }

    /* Flash overlay (rozjasnění obrazovky) */
    .flash{
      position:fixed; inset:0;
      z-index: 10;
      pointer-events:none;
      opacity:0;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,.92), rgba(255,255,255,.25) 40%, rgba(255,255,255,0) 72%);
      transition: opacity .18s ease;
    }
    .flash.is-on{ opacity:1; }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce){
      .laser{ animation:none !important; }
      .enterBtn{ transition:none !important; }
      .flash{ transition:none !important; }
      .bg{ transform:none; }
    }

    /* Mobile tuning */
    @media (max-width:520px){
      .enterWrap{ bottom: 105px; }
      .enterBtn{ width: 140px; height: 140px; border-radius: 16px; }
    }
  </style>
</head>

<body>
  <!-- Background image -->
  <div class="bg" aria-hidden="true"></div>

  <!-- Lasers over background -->
  <div class="fx" aria-hidden="true">
    <div class="laser l1"></div>
    <div class="laser l2"></div>
    <div class="laser l3"></div>
  </div>

  <!-- Back link above everything -->
  <a class="back" href="index.html">← Zpět na web</a>

  <!-- Button -->
  <div class="enterWrap">
    <button class="enterBtn" id="enterBtn" type="button" aria-label="Vstoupit do demo">
      <img src="favicon.png" alt="LuminaMemory™ logo">
    </button>
  </div>

  <!-- Flash -->
  <div class="flash" id="flash" aria-hidden="true"></div>

  <script>
    (function(){
      const btn   = document.getElementById("enterBtn");
      const flash = document.getElementById("flash");
      const target = "mini-login.html";

      btn.addEventListener("click", () => {
        btn.classList.add("is-pressed");
        flash.classList.add("is-on");

        window.setTimeout(()=> flash.classList.remove("is-on"), 220);
        window.setTimeout(()=> { window.location.href = target; }, 950);
      });
    })();
  </script>
</body>
</html>
